workflows:
  android-assemble:
    name: Teclo Build
    environment:
      android_signing:
        - teclo
      vars:
        PACKAGE_NAME: "com.teclo.keyboard"
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
